name: Updates CI
on:
  schedule:
    - cron: "0 3 * * *"
  repository_dispatch:
    types: [updates]
  workflow_dispatch:
jobs:
  release:
    name: Deploy updates
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}
      - name: Update code
        uses: upptime/updates@c8be3a2281e37dfb3211b7cd8f847b014e551634 # master (newer than the last tagged version, v1.0.1)
        env:
          GH_PAT: ${{ github.token }}
