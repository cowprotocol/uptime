name: Setup CI
on:
  push:
    paths:
      - ".upptimerc.yml"
  repository_dispatch:
    types: [setup]
  workflow_dispatch:
jobs:
  release:
    name: Setup Upptime
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}
      # Disabled: Upptime template regeneration rewrites pinned workflow SHAs
      # and breaks org policy that requires full-length commit pins.
      # - name: Update template
      #   uses: upptime/uptime-monitor@faa81958835a8b4f09d11805bf19f276adddae6c # v1.41.8
      #   with:
      #     command: "update-template"
      #   env:
      #     GH_PAT: ${{ github.token }}
      - name: Update response time
        uses: upptime/uptime-monitor@65aad8bba77c40ec051f30e7329563f7f4cfab6e # v1.43.9
        with:
          command: "response-time"
        env:
          GH_PAT: ${{ github.token }}
      - name: Update summary in README
        uses: upptime/uptime-monitor@65aad8bba77c40ec051f30e7329563f7f4cfab6e # v1.43.9
        with:
          command: "readme"
        env:
          GH_PAT: ${{ github.token }}
      - name: Generate graphs
        uses: benc-uk/workflow-dispatch@31e2b3319479a63f0ab15bf800eff9e913504e26 # v1.3.2
        with:
          workflow: Graphs CI
          token: ${{ github.token }}
      - name: Generate site
        uses: upptime/uptime-monitor@65aad8bba77c40ec051f30e7329563f7f4cfab6e # v1.43.9
        with:
          command: "site"
        env:
          GH_PAT: ${{ github.token }}
      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        name: GitHub Pages Deploy
        with:
          github_token: ${{ github.token }}
          publish_dir: "site/status-page/__sapper__/export/"
          force_orphan: "false"
          user_name: "Upptime Bot"
          user_email: "73812536+upptime-bot@users.noreply.github.com"
